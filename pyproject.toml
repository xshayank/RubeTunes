[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # black handles line length

[tool.ruff.lint.isort]
known-first-party = ["rubetunes", "spotify_dl"]

[tool.pytest.ini_options]
testpaths = ["tests"]
